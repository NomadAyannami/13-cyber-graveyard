<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十三的赛博墓地</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: #0a0a0a;
    color: #c0c0c0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== Heavy Metal Texture BG ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(80,0,0,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(40,0,0,0.1) 0%, transparent 50%),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.008) 2px,
        rgba(255,255,255,0.008) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #3a1a1a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #5a2a2a; }

  /* ===== Header ===== */
  .header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 20px 30px;
    border-bottom: 2px solid #2a0a0a;
    background: linear-gradient(180deg, #0d0d0d 0%, #0a0a0a 100%);
  }
  .header h1 {
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #8b0000;
    text-shadow: 0 0 30px rgba(139,0,0,0.5), 0 0 60px rgba(139,0,0,0.2);
    margin-bottom: 8px;
  }
  .header h1 span {
    color: #c0c0c0;
  }
  .header .subtitle {
    font-size: 1rem;
    color: #555;
    letter-spacing: 4px;
    font-style: italic;
  }

  /* ===== Search Section ===== */
  .search-section {
    position: relative;
    z-index: 1;
    padding: 30px 20px;
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .search-box {
    flex: 1;
    display: flex;
    align-items: center;
    background: #111;
    border: 1px solid #2a0a0a;
    border-radius: 6px;
    padding: 0 16px;
    transition: border-color 0.3s;
  }
  .search-box:focus-within {
    border-color: #8b0000;
    box-shadow: 0 0 12px rgba(139,0,0,0.2);
  }
  .search-box .icon {
    color: #555;
    font-size: 1.2rem;
    margin-right: 10px;
  }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #c0c0c0;
    font-size: 1rem;
    padding: 14px 0;
    font-family: inherit;
  }
  .search-box input::placeholder { color: #444; }
  .search-hint {
    color: #555;
    font-size: 0.82rem;
    white-space: nowrap;
  }
  .result-count {
    position: relative;
    z-index: 1;
    text-align: center;
    color: #555;
    font-size: 0.85rem;
    margin: -10px 0 20px;
    min-height: 20px;
  }

  /* ===== Category Grid ===== */
  .categories {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 20px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }

  .category-card {
    background: linear-gradient(145deg, #111 0%, #0d0d0d 100%);
    border: 1px solid #1a0a0a;
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    display: flex;
    flex-direction: column;
  }
  .category-card:hover {
    border-color: #3a1a1a;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    background: linear-gradient(90deg, rgba(139,0,0,0.15), transparent);
    border-bottom: 1px solid #1a0a0a;
  }
  .category-header .skull {
    font-size: 1.3rem;
  }
  .category-header h2 {
    font-size: 1.1rem;
    font-weight: 700;
    color: #8b0000;
    letter-spacing: 2px;
  }
  .category-count {
    margin-left: auto;
    background: #1a0a0a;
    color: #8b0000;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.8rem;
    font-weight: 700;
  }

  .category-body {
    flex: 1;
    max-height: 420px;
    overflow-y: auto;
    padding: 8px;
  }

  /* ===== Person Card ===== */
  .person-card {
    background: #0d0d0d;
    border: 1px solid #1a0a0a;
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .person-card:hover {
    border-color: #3a1a1a;
    background: #121212;
  }
  .person-card:last-child { margin-bottom: 0; }

  .person-card .nickname {
    font-size: 1.05rem;
    font-weight: 700;
    color: #d0d0d0;
    margin-bottom: 4px;
  }
  .person-card .aliases {
    font-size: 0.82rem;
    color: #666;
    margin-bottom: 6px;
  }
  .person-card .aliases .heimu {
    background: #1a1a1a;
    color: #1a1a1a;
    border-radius: 2px;
    padding: 0 4px;
    cursor: default;
    transition: color 0.2s;
  }
  .person-card .aliases .heimu:hover {
    color: #c0c0c0;
  }
  .person-card .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .person-card .tag {
    background: #1a0a0a;
    color: #8b0000;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 0.75rem;
  }
  .person-card .tag.heimu-tag {
    background: #1a1a1a;
    color: #1a1a1a;
    cursor: default;
    transition: color 0.25s;
  }
  .person-card .tag.heimu-tag:hover {
    color: #c0c0c0;
  }

  /* ===== Modal / Detail View ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #0d0d0d;
    border: 1px solid #2a0a0a;
    border-radius: 10px;
    max-width: 680px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 30px;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 18px;
    background: none;
    border: none;
    color: #555;
    font-size: 1.5rem;
    cursor: pointer;
    transition: color 0.2s;
  }
  .modal-close:hover { color: #8b0000; }

  .modal h2 {
    font-size: 1.6rem;
    color: #d0d0d0;
    margin-bottom: 4px;
  }
  .modal .meta {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 16px;
  }
  .modal .info-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
  }
  .modal .info-table td {
    padding: 6px 10px;
    border-bottom: 1px solid #1a0a0a;
    font-size: 0.9rem;
  }
  .modal .info-table td:first-child {
    color: #8b0000;
    font-weight: 600;
    width: 80px;
    white-space: nowrap;
  }
  .modal .info-table td:last-child {
    color: #c0c0c0;
  }
  .modal .heimu {
    background: #1a1a1a;
    color: #1a1a1a;
    border-radius: 2px;
    padding: 0 4px;
    cursor: default;
    transition: color 0.2s;
  }
  .modal .heimu:hover { color: #c0c0c0; }

  .modal .section-title {
    font-size: 1rem;
    color: #8b0000;
    font-weight: 700;
    margin: 16px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #1a0a0a;
  }
  .modal .deed-item {
    padding: 6px 0;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .modal .deed-item strong {
    color: #d0d0d0;
  }
  .modal .media-gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
  }
  .modal .media-item {
    width: 120px;
    height: 90px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid #1a0a0a;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .modal .media-item:hover {
    border-color: #8b0000;
  }

  /* ===== Empty State ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #444;
    position: relative;
    z-index: 1;
  }
  .empty-state .big-skull {
    font-size: 4rem;
    margin-bottom: 16px;
    opacity: 0.3;
  }
  .empty-state p {
    font-size: 1.1rem;
  }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    .header h1 { font-size: 2rem; }
    .search-section { flex-direction: column; gap: 8px; }
    .search-hint { white-space: normal; font-size: 0.75rem; }
    .categories { grid-template-columns: 1fr; }
    .modal { padding: 20px; }
    .category-body { max-height: 300px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>☠ 赛博墓地 <span>Cyber Graveyard</span></h1>
  <div class="subtitle">— 记载见到的赛博神人 —</div>
</div>

<!-- Search -->
<div class="search-section">
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索昵称、外号、QQ号..." autocomplete="off">
  </div>
</div>
<div class="result-count" id="resultCount"></div>

<!-- Category Grid -->
<div class="categories" id="categoryGrid"></div>

<!-- Empty State -->
<div class="empty-state" id="emptyState" style="display:none;">
  <div class="big-skull">💀</div>
  <p>墓地里没有找到匹配的神人</p>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ===== 赛博墓地数据（内嵌，无需外部请求） =====
const GRAVEYARD_DATA = {
  "people": [{
    "name": "灵魂沙沙",
    "QQ": "2088787829",
    "gender": "男",
    "education": "博士在读",
    "source": "原初神人",
    "aliases": [
      { "text": "灵魂莎莎", "isHeimu": false },
      { "text": "莎莎", "isHeimu": false },
      { "text": "沙沙", "isHeimu": false },
      { "text": "灵魂煞笔", "isHeimu": true, "title": "你知道的太多了" }
    ],
    "tags": ["对立话题爱好者", "极度性压抑", "贱嘴"],
    "heimuTags": [{ "text": "疑似女装满足自己性欲", "title": "疑似通过女装满足自己的性欲" }],
    "deeds": [
      { "title": "造女群友黄谣", "desc": "无中生有，恶意中伤女群友" },
      { "title": "对立话题爱好者", "desc": "积极参与包括但不限于男女对立、多元性别对立等各类对立话题" },
      { "title": "男性沙文主义", "desc": "喜好高高在上对群友指指点点" },
      {
        "title": "言行不一",
        "desc": "嘴上抨击LGBT，",
        "heimuSuffix": { "text": "实际上穿女装满足自己的性压抑", "title": "疑似通过女装满足自己的性欲" }
      }
    ],
    "media": [],
    "dir": "灵魂沙沙"
  }],
  "sources": { "原初神人": ["灵魂沙沙"] }
};

let DATA = GRAVEYARD_DATA;

// ===== 渲染 =====
function render(searchTerm) {
  if (!DATA) return;
  const grid = document.getElementById('categoryGrid');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('resultCount');

  const term = (searchTerm || '').trim().toLowerCase();

  // 过滤每个来源下的神人
  const filteredSources = {};
  let totalVisible = 0;

  for (const [source, names] of Object.entries(DATA.sources)) {
    const visible = names.filter(name => {
      if (!term) return true;
      const p = DATA.people.find(p => p.name === name);
      if (!p) return false;
      // 搜索昵称
      if (p.name.toLowerCase().includes(term)) return true;
      // 搜索外号
      if (p.aliases && p.aliases.some(a => a.text.toLowerCase().includes(term))) return true;
      // 搜索QQ
      if (p.QQ && p.QQ.includes(term)) return true;
      return false;
    });
    if (visible.length > 0) {
      filteredSources[source] = visible;
      totalVisible += visible.length;
    }
  }

  // 更新结果计数
  countEl.textContent = term
    ? `找到 ${totalVisible} 位神人`
    : `共 ${DATA.people.length} 位神人安息于此`;

  // 显示/隐藏空状态
  if (Object.keys(filteredSources).length === 0) {
    empty.style.display = 'block';
    grid.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  // 构建HTML — 固定来源排序
  const sourceOrder = [...Object.keys(filteredSources)];
  // 把"原初神人"排最前
  const idx = sourceOrder.indexOf('原初神人');
  if (idx > 0) { sourceOrder.splice(idx, 1); sourceOrder.unshift('原初神人'); }

  let html = '';
  for (const source of sourceOrder) {
    const persons = filteredSources[source];
    html += `
      <div class="category-card">
        <div class="category-header">
          <span class="skull">💀</span>
          <h2>${escapeHtml(source)}</h2>
          <span class="category-count">${persons.length}</span>
        </div>
        <div class="category-body">
          ${persons.map(name => {
            const p = DATA.people.find(p => p.name === name);
            if (!p) return '';
            const aliases = p.aliases || [];
            const tags = p.tags || [];
            return `
              <div class="person-card" onclick="showDetail('${escapeHtml(name)}')">
                <div class="nickname">${escapeHtml(name)}</div>
                ${aliases.length ? `<div class="aliases">${renderAliases(aliases)}</div>` : ''}
                <div class="tags">
                  ${tags.slice(0, 4).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                  ${(p.heimuTags || []).map(h => `<span class="tag heimu-tag" title="${h.title}">${h.text}</span>`).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }
  grid.innerHTML = html;
}

function renderAliases(aliases) {
  return aliases.map(a => {
    if (a.isHeimu) {
      return `<span class="heimu" title="${a.title}">${a.text}</span>`;
    }
    return escapeHtml(a.text);
  }).join(' · ');
}

// ===== 详情弹窗 =====
function showDetail(name) {
  const p = DATA.people.find(p => p.name === name);
  if (!p) return;

  const content = document.getElementById('modalContent');

  const fields = [
    ['QQ', p.QQ],
    ['性别', p.gender],
    ['学历', p.education],
    ['来源', p.source],
  ].filter(([, v]) => v);

  const aliases = p.aliases || [];
  const tags = p.tags || [];
  const deeds = p.deeds || [];
  const media = p.media || [];

  const deedsHtml = deeds.length ? `
    <div class="section-title">⚔️ 事迹</div>
    ${deeds.map(d => {
      let descHtml = escapeHtml(d.desc);
      if (d.heimuSuffix) {
        descHtml += ` <span class="heimu" title="${d.heimuSuffix.title}">${d.heimuSuffix.text}</span>`;
      }
      return `<div class="deed-item"><strong>${escapeHtml(d.title)}</strong> — ${descHtml}</div>`;
    }).join('')}
  ` : '';

  const mediaHtml = media.length ? `
    <div class="section-title">📷 媒体档案</div>
    <div class="media-gallery">
      ${media.map(m => `<img class="media-item" src="${escapeHtml(m)}" alt="" onclick="window.open(this.src)">`).join('')}
    </div>
  ` : '';

  content.innerHTML = `
    <h2>${escapeHtml(name)}</h2>
    <div class="meta">${renderAliases(aliases)}</div>

    <table class="info-table">
      ${fields.map(([k, v]) =>
        `<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(v)}</td></tr>`
      ).join('')}
    </table>

    ${(tags.length || (p.heimuTags && p.heimuTags.length)) ? `
      <div class="section-title">🏷️ 标签</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;">
        ${tags.map(t => `<span class="tag" style="background:#1a0a0a;color:#8b0000;padding:2px 8px;border-radius:3px;font-size:0.8rem;">${escapeHtml(t)}</span>`).join('')}
        ${(p.heimuTags || []).map(h => `<span class="heimu" style="padding:2px 8px;border-radius:3px;font-size:0.8rem;display:inline-block;" title="${h.title}">${h.text}</span>`).join('')}
      </div>
    ` : ''}

    ${deedsHtml}
    ${mediaHtml}
  `;

  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('active');
}

// ===== 工具函数 =====
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== 搜索监听 =====
document.getElementById('searchInput').addEventListener('input', function() {
  render(this.value);
});

// ===== 键盘快捷键 =====
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ===== 初始化 =====
render('');
</script>
</body>
</html>
